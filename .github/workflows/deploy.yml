# .gitlab-ci.yml
stages:
  - test
  - build
  - deploy

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  POSTGRES_USER: kubsu
  POSTGRES_PASSWORD: kubsu
  POSTGRES_DB: kubsu
  POSTGRES_HOST: postgres

# Кэшируем зависимости
cache:
  paths:
    - .venv/
    - .pytest_cache/

# Этап тестирования
test:
  stage: test
  image: docker:latest
  services:
    - docker:dind
    - postgres:15
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    POSTGRES_DB: kubsu
    POSTGRES_USER: kubsu
    POSTGRES_PASSWORD: kubsu
  before_script:
    - docker info
  script:
    # Собираем образ
    - docker build -t app:test .
    
    # Проверяем размер образа
    - docker images app:test --format "Image size: {{.Size}}"
    
    # Запускаем тесты в контейнере с подключением к PostgreSQL
    - docker run --rm 
        --network $CI_JOB_NETWORK 
        -e DATABASE_URL=postgresql+psycopg://kubsu:kubsu@postgres:5432/kubsu 
        app:test 
        pytest tests/ -v
    
    # Сохраняем образ для деплоя
    - docker tag app:test $DOCKER_IMAGE
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $DOCKER_IMAGE
  only:
    - master
    - main

# Этап сборки (многостадийная)
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    # Многостадийная сборка для оптимизации размера
    - docker build --no-cache -t $DOCKER_IMAGE .
    
    # Проверяем слои и размер
    - docker images $DOCKER_IMAGE --format "Final image size: {{.Size}}"
    
    # Пушим в registry GitLab
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $DOCKER_IMAGE
    
    # Сохраняем как latest
    - docker tag $DOCKER_IMAGE $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - master
    - main

# Этап деплоя на сервер
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    # Копируем Docker образ на сервер (если есть Docker) или код
    - scp -P $SSH_PORT -o StrictHostKeyChecking=no 
        -r $CI_PROJECT_DIR/src 
        $SERVER_USER@$SERVER_HOST:~/app/
    
    - ssh -p $SSH_PORT -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << EOF
        cd ~/app
        
        # Проверяем наличие Docker
        if command -v docker &> /dev/null; then
          echo "Docker found, deploying container..."
          # Скачиваем образ из GitLab registry
          docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
          docker pull $CI_REGISTRY_IMAGE:latest
          
          # Останавливаем старый контейнер
          docker stop user-crud-app || true
          docker rm user-crud-app || true
          
          # Запускаем новый
          docker run -d \
            --name user-crud-app \
            -p 60080:60080 \
            --restart unless-stopped \
            $CI_REGISTRY_IMAGE:latest
        else
          echo "Docker not found, deploying with Python..."
          # Устанавливаем зависимости
          python3 -m pip install --user fastapi uvicorn sqlalchemy asyncpg psycopg2-binary
          
          # Останавливаем старый процесс
          pkill -f "python3.*src.main" || true
          
          # Запускаем приложение
          nohup python3 -m uvicorn src.main:app \
            --host 0.0.0.0 \
            --port 60080 \
            > app.log 2>&1 &
        fi
        
        # Проверка
        sleep 5
        curl -f http://localhost:60080/health || echo "Health check failed"
      EOF
  only:
    - master
    - main
  environment:
    name: production
    url: http://$SERVER_HOST:60080
