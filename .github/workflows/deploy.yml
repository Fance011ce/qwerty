name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Build image
        run: podman build -t app .

      - name: Run tests IN the built image
        run: |
          podman run --rm --network host app pytest tests/ -v

      - name: Deploy container
        run: |
          podman rm -f user-crud-app || true
          podman run -d --name user-crud-app --network host --replace app
      
      - name: Health check
        run: |
          sleep 3
          curl -f http://localhost:8034/health
